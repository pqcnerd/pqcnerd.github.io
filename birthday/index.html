<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./img/flowers.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;500;900&display=swap" rel="stylesheet">
    <title>Happy Birthday, Annie ♥</title>
</head>
<body>

    <!-- Balloons -->
    <div class="balloon balloon--1"></div>
    <div class="balloon balloon--2"></div>
    <div class="balloon balloon--3"></div>
    <div class="balloon balloon--4"></div>
    <div class="balloon balloon--5"></div>
    <div class="balloon balloon--6"></div>

    <!-- Confetti -->
    <div class="confetti confetti--1"></div>
    <div class="confetti confetti--2"></div>
    <div class="confetti confetti--3"></div>
    <div class="confetti confetti--4"></div>
    <div class="confetti confetti--5"></div>
    <div class="confetti confetti--6"></div>
    <div class="confetti confetti--7"></div>
    <div class="confetti confetti--8"></div>
    <div class="confetti confetti--9"></div>
    <div class="confetti confetti--10"></div>
    <div class="confetti confetti--11"></div>
    <div class="confetti confetti--12"></div>
    <div class="confetti confetti--13"></div>
    <div class="confetti confetti--14"></div>
    <div class="confetti confetti--15"></div>
    <div class="confetti confetti--16"></div>
    <div class="confetti confetti--17"></div>
    <div class="confetti confetti--18"></div>
    <div class="confetti confetti--19"></div>
    <div class="confetti confetti--20"></div>

    <!-- Kuromi peeking from corner -->
    <img
      class="landing-kuromi"
      src="../kumori-corner-peak-sticker-kumori-corner-peak-peaking.gif"
      alt="Kuromi"
      aria-hidden="true"
    />

    <!-- Stars / sparkles -->
    <div class="sparkles">
        <div class="sparkle sparkle--1">✦</div>
        <div class="sparkle sparkle--2">✦</div>
        <div class="sparkle sparkle--3">✧</div>
        <div class="sparkle sparkle--4">✦</div>
        <div class="sparkle sparkle--5">✧</div>
        <div class="sparkle sparkle--6">✦</div>
    </div>

    <div class="content">
        <p class="subtitle">for the one and only</p>

        <div class="greetings">
            <span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>
        </div>
        <div class="greetings greetings--bday">
            <span>B</span><span>i</span><span>r</span><span>t</span><span>h</span><span>d</span><span>a</span><span>y</span><span>,</span>
        </div>
        <div class="greetings greetings--name">
            <span>A</span><span>n</span><span>n</span><span>i</span><span>e</span>
        </div>

        <div class="description">
            <span>I made something just for you</span>
            <span class="heart">♥</span>
        </div>

        <div class="button">
            <a href="./FLORES.html" class="gift-btn">
                Open Your Gift <span class="arrow">→</span>
            </a>
        </div>
    </div>

</body>
</html>
