<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THRESHOLD</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #2a3240;
  --text: #e8dcc8;
  --muted: #8a9ab0;
  --amber: #c9a96e;
  --amber-dim: #9a7a52;
  --green: #4caf87;
  --red: #c05555;
  --warm: #1a1510;
  --hk-bg: #0d1520;
  --hk-surface: #111c2a;
  --hk-amber: #6eb4c9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 18px;
  line-height: 1.75;
  min-height: 100vh;
}
.page { display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  flex-shrink: 0;
  flex-wrap: wrap;
  gap: 8px;
}
.game-title { color: var(--amber); font-size: 15px; font-weight: 500; letter-spacing: 0.15em; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.breadcrumb { color: var(--muted); font-size: 12px; }
.breadcrumb span { color: var(--amber-dim); }
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.main-panel {
  flex: 1;
  padding: 36px 40px;
  overflow-y: auto;
  max-width: 780px;
}
.note-panel {
  width: 240px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 24px 18px;
  overflow-y: auto;
  flex-shrink: 0;
  font-family: 'Fira Code', monospace;
  font-size: 12px;
}
.note-panel h2 {
  color: var(--amber);
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
  font-weight: 500;
}
.fragment-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 12px;
  margin-bottom: 10px;
  font-size: 11px;
  line-height: 1.5;
}
.fragment-card .fc-label { color: var(--muted); margin-bottom: 4px; }
.fragment-card .fc-number { color: var(--amber); font-size: 14px; font-weight: 500; }
.fragment-card.empty { color: var(--border); font-style: italic; }
.scene-title {
  font-family: 'Fira Code', monospace;
  font-size: 14px;
  color: var(--amber-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.scene-body { margin-bottom: 24px; }
.scene-body p { margin-bottom: 12px; }
.scene-body blockquote {
  border-left: 2px solid var(--border);
  padding-left: 16px;
  margin: 12px 0;
  color: var(--muted);
  font-style: italic;
}
.scene-body pre {
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 16px;
  margin: 12px 0;
  border-radius: 3px;
  white-space: pre-wrap;
  line-height: 1.6;
  color: var(--text);
}
.scene-body .acrostic-line { display: block; }
.scene-body .acrostic-first { color: var(--amber); font-weight: 500; }
.objects { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.obj-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--amber);
  font-family: 'EB Garamond', serif;
  font-size: 16px;
  padding: 4px 12px;
  cursor: pointer;
  border-radius: 2px;
  transition: border-color 0.15s, color 0.15s;
}
.obj-btn:hover { border-color: var(--amber); color: var(--amber); }
.obj-btn.tuna { color: #a0c8a0; border-color: #2a4a2a; font-style: italic; }
.obj-btn.tuna:hover { border-color: #4caf87; color: var(--green); }
.obj-btn.nav { color: var(--muted); border-color: #222; font-size: 14px; }
.obj-btn.nav:hover { border-color: var(--border); color: var(--text); }
.obj-btn.locked { color: var(--border); border-color: #1a1a1a; cursor: not-allowed; font-style: italic; }
.detail-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 18px 22px;
  margin-bottom: 20px;
  font-style: italic;
  color: var(--muted);
  line-height: 1.75;
}
.detail-card p { margin-bottom: 10px; }
.detail-card p:last-child { margin-bottom: 0; }
.detail-card blockquote {
  border-left: 2px solid var(--amber-dim);
  padding-left: 14px;
  margin: 10px 0;
  color: var(--text);
}
.detail-card pre {
  font-family: 'Fira Code', monospace;
  font-size: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 10px 14px;
  margin: 10px 0;
  border-radius: 2px;
  white-space: pre-wrap;
  color: var(--text);
  font-style: normal;
}
.detail-card .acrostic-first { color: var(--amber); font-weight: 500; font-style: normal; }
.puzzle-zone {
  border-top: 1px solid var(--border);
  padding-top: 20px;
  margin-top: 4px;
}
.puzzle-zone .puzzle-prompt {
  color: var(--muted);
  font-style: italic;
  margin-bottom: 14px;
  font-size: 17px;
}
.input-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.txt-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Fira Code', monospace;
  font-size: 14px;
  padding: 8px 12px;
  border-radius: 2px;
  min-width: 200px;
  outline: none;
}
.txt-input:focus { border-color: var(--amber-dim); }
.txt-input.locked { color: var(--green); border-color: #2a4a2a; }
.btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 2px;
  transition: border-color 0.15s;
}
.btn:hover { border-color: var(--amber-dim); }
.feedback {
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  margin-top: 10px;
  min-height: 22px;
  padding: 4px 0;
}
.feedback.ok { color: var(--green); }
.feedback.err { color: var(--red); }
.feedback.info { color: var(--amber-dim); }
.wing-badge {
  display: inline-block;
  font-family: 'Fira Code', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
}
.wing-badge.done { color: var(--green); border-color: #2a4a2a; }
.door-list { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
.door-link {
  display: inline-block;
  color: var(--amber);
  cursor: pointer;
  font-size: 18px;
  padding: 4px 0;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}
.door-link:hover { border-color: var(--amber); }
.door-link.locked-door { color: var(--muted); cursor: default; font-style: italic; }
.solved-notice {
  font-family: 'Fira Code', monospace;
  font-size: 12px;
  color: var(--green);
  margin-top: 8px;
}
/* Drag puzzle (Scene 19) */
.drag-letters { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
.letter-token {
  width: 48px; height: 48px;
  background: var(--surface);
  border: 2px solid var(--border);
  color: var(--amber);
  font-family: 'Fira Code', monospace;
  font-size: 22px;
  font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  cursor: grab;
  border-radius: 3px;
  user-select: none;
}
.letter-token:active { cursor: grabbing; opacity: 0.7; }
.letter-token.dragging { opacity: 0.4; }
.letter-slots { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
.letter-slot {
  width: 48px; height: 48px;
  background: var(--bg);
  border: 2px dashed var(--border);
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fira Code', monospace;
  font-size: 22px;
  color: var(--amber);
  cursor: default;
  transition: border-color 0.15s;
  position: relative;
}
.letter-slot.over { border-color: var(--amber-dim); }
.letter-slot .slot-idx {
  position: absolute; bottom: 2px; right: 4px;
  font-size: 9px; color: var(--muted);
}
.letter-slot.filled { border-style: solid; border-color: var(--amber-dim); }
/* Synthesis room */
.synthesis-grid { display: flex; flex-direction: column; gap: 14px; margin: 16px 0; }
.synthesis-slot {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.synthesis-slot .slot-label {
  flex: 1;
  font-style: italic;
  color: var(--muted);
  font-size: 16px;
  min-width: 200px;
}
.synthesis-slot .slot-input {
  width: 70px;
  text-align: center;
}
.synthesis-slot.correct { border-color: #2a4a2a; }
.synthesis-slot .slot-check { font-size: 12px; color: var(--green); font-family: 'Fira Code', monospace; }
.synthesis-result {
  font-family: 'Fira Code', monospace;
  font-size: 24px;
  letter-spacing: 0.3em;
  color: var(--amber);
  text-align: center;
  margin: 20px 0;
  min-height: 36px;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.shake { animation: shake 0.3s ease; }
/* Tuna overlay (Scene 23) */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.overlay-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 36px 40px;
  max-width: 520px;
  width: 90%;
  position: relative;
}
.overlay-box h2 { color: var(--amber); font-family: 'Fira Code', monospace; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
.overlay-close {
  position: absolute; top: 14px; right: 18px;
  background: none; border: none;
  color: var(--muted); font-size: 18px; cursor: pointer;
  font-family: 'Fira Code', monospace;
}
.overlay-close:hover { color: var(--text); }
/* Warm room variant */
.warm-room { background: #110e09; }
.warm-room .main-panel { background: #110e09; }
/* HK room variant */
.hk-room body, .hk-room .main-panel { background: var(--hk-bg); }
/* Reset save */
.reset-btn { background: none; border: none; color: var(--muted); font-family: 'Fira Code', monospace; font-size: 11px; cursor: pointer; padding: 2px 6px; }
.reset-btn:hover { color: var(--red); }
/* Final door */
.final-door-prompt { text-align: center; margin: 30px 0; }
.final-door-prompt .door-question { font-size: 22px; color: var(--muted); font-style: italic; margin-bottom: 20px; }
.final-input { font-size: 20px; min-width: 260px; text-align: center; letter-spacing: 0.15em; }
/* Fragment slot widget (note panel bottom) */
.note-divider { border-top: 1px solid var(--border); margin: 14px 0; }
.note-panel .wing-status { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
.note-panel .wing-status.done { color: var(--green); }
/* Scratch pad panel */
.scratch-panel {
  width: 280px;
  min-width: 200px;
  background: var(--bg);
  border-left: 1px solid var(--border);
  padding: 20px 16px 16px;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  font-family: 'Fira Code', monospace;
}
.scratch-panel h2 {
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: 500;
  flex-shrink: 0;
}
.scratch-panel textarea {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 15px;
  line-height: 1.65;
  padding: 10px 12px;
  resize: none;
  outline: none;
  width: 100%;
  min-height: 0;
  transition: border-color 0.15s;
}
.scratch-panel textarea:focus {
  border-color: var(--amber-dim);
}
.scratch-panel textarea::placeholder {
  color: var(--border);
  font-style: italic;
}
.scratch-saved {
  font-size: 10px;
  color: var(--border);
  text-align: right;
  margin-top: 6px;
  height: 12px;
  transition: color 0.3s;
  flex-shrink: 0;
}
.scratch-saved.visible { color: var(--muted); }
</style>

<body>
<div class="page" id="app">
  <div class="topbar">
    <div>
      <span class="game-title">THRESHOLD</span>
      <span id="breadcrumb" class="breadcrumb"></span>
    </div>
    <div class="topbar-right">
      <button class="reset-btn" id="resetBtn" title="Reset all progress">reset</button>
    </div>
  </div>
  <div class="layout">
    <main class="main-panel" id="mainPanel">
      <div class="scene-title" id="sceneTitle"></div>
      <div class="scene-body" id="sceneBody"></div>
      <div class="objects" id="objects"></div>
      <div id="detailCard"></div>
      <div class="puzzle-zone" id="puzzleZone" style="display:none;"></div>
      <div class="feedback" id="feedback"></div>
    </main>
    <aside class="note-panel" id="notePanel">
      <h2>Fragments</h2>
      <div id="notebookBody"></div>
      <div class="note-divider"></div>
      <div id="wingStatus"></div>
    </aside>
    <aside class="scratch-panel">
      <h2>Notes</h2>
      <textarea id="scratchPad" placeholder="Write anything here — observations, guesses, working..."></textarea>
      <div class="scratch-saved" id="scratchSaved"></div>
    </aside>
  </div>
</div>
<div id="tunaOverlay" style="display:none;"></div>
<script>
// ──────────────────────────────────────────────
// CONSTANTS
// ──────────────────────────────────────────────
const STORAGE_KEY = "threshold_v3_state";

const FRAGMENTS = [
  { id: "A",  label: "The philosopher's one serious question",    number: 1,  source: "scene3"  },
  { id: "N1", label: "Three names, counted to their last letter", number: 14, source: "scene5"  },
  { id: "N2", label: "A suit's worth forward from the first",     number: 14, source: "scene9"  },
  { id: "I",  label: "Rooms designed with porosity, windows open",number: 9,  source: "scene8"  },
  { id: "E",  label: "Letters in the word Sisyphus was given",    number: 5,  source: "scene19" },
];

const SYNTHESIS_LABELS = [
  { id: "A",  text: "The only serious question — how many answers does the philosopher accept?",            answer: 1  },
  { id: "N1", text: "Count every letter the artist was born with — all three names.",                       answer: 14 },
  { id: "N2", text: "From A, count forward one full suit of cards. Where does the alphabet land?",          answer: 14 },
  { id: "I",  text: "How many windows open in a room designed by the sponge architect?",                    answer: 9  },
  { id: "E",  text: "The word that set Sisyphus free — how many letters does it hold?",                     answer: 5  },
];

// ──────────────────────────────────────────────
// TUNA HINTS (per scene, 3 tiers)
// ──────────────────────────────────────────────
const TUNA_ASLEEP = `Tuna has settled into a tight spiral. Her breathing has slowed. She is asleep in the specific way that makes it impossible to justify waking her. She is unavailable for hints. She was barely available before.`;

const TUNA_HINTS = {
  entrance: [
    `Tuna is sitting in front of the sealed door as if she placed herself there deliberately. She has not. She is simply a cat, and this is where she sat.`,
    `She has not moved. She seems to believe the sealed door is hers. Perhaps it is.`,
    `Tuna turns. She looks at the three open doors. She looks back at the sealed door. She returns to looking at the three open doors. This is, genuinely, as much guidance as she is able to offer.`,
  ],
  scene1: [
    `Tuna is lying across the open book. She has covered Part Two entirely. Whatever Raskolnikov is doing on those pages, it is now Tuna's business.`,
    `She lifts her head. She stares at the torn paper on the floor. She bats it once. It spins. She decides this is enough and looks away.`,
    `Tuna places a paw over the burned-out word. She seems to be considering whether she has the word. Whether she has the permission. She decides she does not. She is, in this sense, one of the ordinary ones.`,
  ],
  scene2: [
    `Tuna jumps onto the table and sits directly on the brain diagram. She begins to purr. Whether this is emotional or physiological is unclear. Possibly both.`,
    `She is examining the blacked-out text with great interest. She does not read. She is, however, pressing her face against the blackout bar as if proximity is a substitute for knowledge.`,
    `Tuna looks at the bookshelves. She looks at you. She very deliberately turns her back to the room, facing inward toward the wall — the same direction as all the books. She sits there. This is probably a comment about construction and context. Probably.`,
  ],
  scene3: [
    `Tuna sits on top of the brass box. She is considering the dial. She turns it with her paw. She lands on 7. Nothing happens. She turns it again. She lands on 7 again. She seems satisfied. Nothing happens.`,
    `She is now examining the identical books. She has selected one. She is sitting on it. She has not opened it. This is her relationship to philosophy in general.`,
    `Tuna walks to the chalkboard. She looks at the blank. She looks at you. She holds up one paw. Slowly. Deliberately. She is counting. She is counting to the answer. She puts the paw down. She has said all she is prepared to say.`,
  ],
  scene4: [
    `Tuna is sitting inside the empty record sleeve. She is perfectly sized for it. She looks extremely comfortable. The record player spins beside her. She does not acknowledge it.`,
    `She has decided to sit directly in front of the door labeled north. She will not move. She is not blocking it. She is simply very close to it. There is something about the name on the door that interests her.`,
    `Tuna yawns. She shows her teeth. Then she looks at the setlist on the wall. Then at the note. Then at you. The note mentions an angel. She does not know what angels are called. But she knows what you should be searching for.`,
  ],
  scene5: [
    `Tuna sits beside the plaque. She seems to be counting something. She gets to four. She stops. She has counted her own paws. She is wrong. She is also counting the wrong thing.`,
    `She looks at the photograph. She looks at you. She looks at the photograph again. She presses her nose to the glass. She seems to want you to read the photograph more carefully. She is not able to specify which part.`,
    `Tuna puts her paw on the photograph. She moves it first to the face, then to the text beneath: Casey. She moves it to the second word: Thai. Then the third: Luong. She counts — one group, two groups, three groups — and then knocks the photograph off the wall entirely. She has said what she came to say.`,
  ],
  scene6: [
    `Tuna walks the length of the blue corridor very slowly. She examines every canvas. She selects none of them as meaningful. She sits at the far end, near the door, and stares back at you.`,
    `She is pressing herself against the door as if she can push it open with her body weight. She cannot. She weighs approximately what she weighs. The door does not care.`,
    `Tuna sits beside the journal. She puts a paw on it. She seems to be indicating: the answer is in here. More specifically: the date, the event, the name that was given up. She does not type. You will have to type.`,
  ],
  scene7: [
    `Tuna is sitting in the middle of the painted blizzard on the ceiling. She is not on the ceiling. She is on the floor beneath it, staring up at it. She seems to find the blizzard specifically interesting.`,
    `She has jumped onto the reading table. She is sitting on the printed page. She is covering most of it. The first letters of each sentence are still visible at the left margin, if you look carefully.`,
    `Tuna stands up. She walks from the top of the page to the bottom, pressing each first letter with her paw as she goes: first column, first column, first column. She reaches the bottom. She looks at you. She has done something deliberate. Whether you understood it is your problem.`,
  ],
  scene8: [
    `Tuna is walking across the blueprints spread on the floor, leaving no marks. She examines Vassar Street with the authority of someone who has lived there. She has not lived there.`,
    `She has found the detail circle on the drafting table. She is sitting inside it with her whole body, having determined that the circle is hers. She is not in the way of the annotation. She is in the way of everything else.`,
    `Tuna walks to the window of this room. She sits and looks out. She turns back to look at you. She turns to the window again. She counts the panes of the window she is sitting in front of. She gets to three and loses interest. She is not helpful with the counting. But she is pointing at windows.`,
  ],
  scene9: [
    `Tuna is spinning the cipher wheel with her paw. She stops on M. She looks satisfied. M is not the answer. She spins again. She stops on M. This is a pattern with her.`,
    `She has climbed inside the cipher wheel like a wheel of fortune. She rotates herself a quarter turn. She is now looking at the ceiling. This is not a hint.`,
    `Tuna looks at the playing card display. She puts one paw on the glass. Then she walks over to the cipher wheel, sits on A, and looks expectantly at the card display. She looks back at A. She looks at you. She is pointing at the start. She is pointing at the shift. She is, somehow, pointing at thirteen.`,
  ],
  scene10: [
    `Tuna is inside the chest. She is sitting on the note. She has not read the note. She is simply occupying it, as is her custom.`,
    `She climbs out of the chest. She walks to the stone door and sits facing it. She knows what is on the other side. She will not say. This is, in a sense, the point of the room.`,
    `Tuna turns to look at you. She looks at shiny's last line — 'exactly.' She looks back at you. She has understood the philosophical point and is communicating it by proximity to the relevant text. She cannot type the three words. But she has gestured at the concept: proving by not telling.`,
  ],
  scene11: [
    `Tuna has positioned herself exactly at the fork between the two passages. She is looking at both. She seems to be waiting to see which one you will choose. She is the verifier.`,
    `She has gone down the left passage. She has not come back. A moment passes. She comes back from the right passage. This was not magic. This was a cat.`,
    `Tuna does the two-passage demonstration again. This time she does it seven times. Left in, right out. Right in, right out. Left in, left out. She returns each time. She is counting. By the seventh round she seems satisfied. She sits. She blinks at you. Seven.`,
  ],
  scene12: [

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
function defaultState() {
  return {
    scene: "entrance",
    solved: {},         // sceneKey -> true
    tunaState: 0,       // 0–3 (0=none,1=tier1,2=tier2,3=tier3), resets on nav
    tunaScene: null,    // which scene the current tuna state belongs to
    fragments: {},      // fragmentId -> true
    puzzle: {
      scene12: { leftDone: false },
      scene14: { field1Done: false },
      scene17: { field1Done: false },
      scene19: { slots: [null,null,null,null,null] },
      scene20: { shuffleOrder: null, placed: {}, done: false },
    },
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const p = JSON.parse(raw);
    const d = defaultState();
    return Object.assign(d, {
      scene: p.scene || d.scene,
      solved: p.solved || {},
      fragments: p.fragments || {},
      puzzle: Object.assign(d.puzzle, p.puzzle || {}),
    });
  } catch(e) { return defaultState(); }
}

function saveState() {
  const toSave = {
    scene: STATE.scene,
    solved: STATE.solved,
    fragments: STATE.fragments,
    puzzle: STATE.puzzle,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
}

let STATE = loadState();

// ──────────────────────────────────────────────
// UTILITIES
// ──────────────────────────────────────────────
function normalize(v) {
  return String(v).toLowerCase().replace(/[.,!?'"]/g, "").replace(/\s+/g, " ").trim();
}
function matchesAnswer(val, accepted) {
  const n = normalize(val);
  return accepted.some(a => normalize(a) === n);
}
function isSolved(key) { return !!STATE.solved[key]; }
function markSolved(key) {
  STATE.solved[key] = true;
  saveState();
}
function hasFragment(id) { return !!STATE.fragments[id]; }
function grantFragment(id) {
  STATE.fragments[id] = true;
  saveState();
}

function wing1Done() { return isSolved("scene3"); }
function wing2Done() { return isSolved("scene7"); }
function wing3Done() { return isSolved("scene12"); }
function wing4BostonDone() { return isSolved("scene15"); }
function wing4HKDone() { return isSolved("scene17"); }
function wing4Done() { return wing4BostonDone() && wing4HKDone(); }
function wing5Ready() { return wing1Done() && wing2Done() && wing3Done() && wing4Done(); }
function allFragments() { return FRAGMENTS.every(f => hasFragment(f.id)); }

function setFeedback(msg, kind) {
  feedbackEl.textContent = msg;
  feedbackEl.className = "feedback " + (kind || "");
}
function clearFeedback() { feedbackEl.textContent = ""; feedbackEl.className = "feedback"; }
function setDetail(html) {
  detailCardEl.innerHTML = `<div class="detail-card">${html}</div>`;
}
function clearDetail() { detailCardEl.innerHTML = ""; }
function hidePuzzle() { puzzleZoneEl.style.display = "none"; puzzleZoneEl.innerHTML = ""; }
function showPuzzle() { puzzleZoneEl.style.display = "block"; }

function objBtn(label, handler, cls) {
  const b = document.createElement("button");
  b.className = "obj-btn " + (cls || "");
  b.textContent = "[" + label + "]";
  b.addEventListener("click", () => { clearDetail(); clearFeedback(); handler(); });
  return b;
}
function navBtn(label, target) {
  const b = document.createElement("button");
  b.className = "obj-btn nav";
  b.textContent = "[" + label + "]";
  b.addEventListener("click", () => navTo(target));
  return b;
}
function tunaBtn(sceneKey) {
  const b = document.createElement("button");
  b.className = "obj-btn tuna";
  b.textContent = "[ask tuna]";
  b.addEventListener("click", () => {
    clearFeedback();
    if (STATE.tunaScene !== sceneKey) {
      STATE.tunaState = 0;
      STATE.tunaScene = sceneKey;
    }
    const hints = TUNA_HINTS[sceneKey] || [];
    if (STATE.tunaState >= 3) {
      setDetail(`<p><em>${TUNA_ASLEEP}</em></p>`);
    } else {
      const hint = hints[STATE.tunaState];
      STATE.tunaState++;
      setDetail(`<p><em>${hint}</em></p>`);
    }
  });
  return b;
}
function inputRow(placeholder, cls) {
  const inp = document.createElement("input");
  inp.type = "text";
  inp.className = "txt-input " + (cls || "");
  inp.placeholder = placeholder || "";
  inp.addEventListener("input", () => checkTunaHome(inp.value));
  return inp;
}
function submitBtn(label) {
  const b = document.createElement("button");
  b.className = "btn";
  b.textContent = label || "submit";
  return b;
}
function puzzlePrompt(text) {
  const p = document.createElement("p");
  p.className = "puzzle-prompt";
  p.innerHTML = text;
  return p;
}
function solvedNotice(text) {
  const d = document.createElement("div");
  d.className = "solved-notice";
  d.innerHTML = "&#10003; " + (text || "solved.");
  return d;
}

function renderNotebook() {
  notebookBodyEl.innerHTML = "";
  FRAGMENTS.forEach(f => {
    const card = document.createElement("div");
    if (hasFragment(f.id)) {
      card.className = "fragment-card";
      card.innerHTML = `<div class="fc-label">${f.label}</div><div class="fc-number">№ ${f.number}</div>`;
    } else {
      card.className = "fragment-card empty";
      card.textContent = "[not yet found]";
    }
    notebookBodyEl.appendChild(card);
  });

  wingStatusEl.innerHTML = "";
  const wings = [
    { label: "Wing 1 — Library",       done: wing1Done() },
    { label: "Wing 2 — Music Archive", done: wing2Done() },
    { label: "Wing 3 — Logic Annex",   done: wing3Done() },
    { label: "Wing 4 — Two Cities",    done: wing4Done() },
    { label: "Wing 5 — Inner Sanctum", done: isSolved("scene21") },
  ];
  wings.forEach(w => {
    const d = document.createElement("div");
    d.className = "wing-status" + (w.done ? " done" : "");
    d.textContent = (w.done ? "✓ " : "  ") + w.label;
    wingStatusEl.appendChild(d);
  });
}

  render();
  window.scrollTo(0,0);
  document.getElementById("mainPanel").scrollTo(0,0);
}

// ── SCENE 19 — Sisyphus Room ★ ──
function renderScene19() {
  setBreadcrumb("Wing 5 / Scene 19 ★");
  sceneTitleEl.textContent = "Scene 19 — The Sisyphus Room ★";
  document.getElementById("mainPanel").style.background = "#0f0d0a";
  sceneBodyEl.innerHTML = `
    <p>A circular room. A domed ceiling. Painted on the dome: a figure pushing a boulder upward along a slope. The boulder is near the top. Below the figure, in large letters:</p>
    <blockquote><em>"One must imagine Sisyphus ....."</em></blockquote>
    <p>At the center: a pedestal. On the velvet tray, five glass letters scrambled: <strong>Y &nbsp; H &nbsp; P &nbsp; P &nbsp; A</strong></p>
    <p>A plaque: <em>"Rearrange these letters. When the word is correct, count its letters. That number is your last fragment."</em></p>
    <p>A floor note: <em>"This is the strangest sentence Camus wrote. He imagined a man condemned to eternal, pointless repetition — rolling a boulder forever, watching it fall — and said: we should imagine him happy. Not resigned. Not hopeful. Happy. Because the struggle itself toward the heights is enough to fill a human heart. He gave Sisyphus one word. Count it."</em></p>`;

  hidePuzzle();
  clearDetail();
  clearFeedback();
  objectsEl.innerHTML = "";

  objectsEl.appendChild(objBtn("dome — look up", () => setDetail(`<p>The figure pushes the boulder. The boulder is near the top. It will fall. He will return. He will push again. The dome shows one moment in an infinite sequence. It chose the moment before the fall, not the fall itself. Camus would approve.</p>`)));
  objectsEl.appendChild(objBtn("floor note", () => setDetail(`<p><em>"This is the strangest sentence Camus wrote. He imagined a man condemned to eternal, pointless repetition — rolling a boulder forever, watching it fall — and said: we should imagine him happy. Not resigned. Not hopeful. Happy. Because the struggle itself toward the heights is enough to fill a human heart. He gave Sisyphus one word. Count it."</em></p>`)));
  objectsEl.appendChild(tunaBtn("scene19"));
  objectsEl.appendChild(navBtn("← scene 18", "scene18"));

  showPuzzle();
  puzzleZoneEl.innerHTML = "";

  if (isSolved("scene19")) {
    puzzleZoneEl.appendChild(solvedNotice(`Fragment E collected. HAPPY — 5 letters.`));
    const fc = document.createElement("div");
    fc.className = "fragment-card";
    fc.innerHTML = `<div class="fc-label">The fifth fragment. The word Camus gave to Sisyphus: HAPPY. Five letters.</div><div class="fc-number">№ 5</div>`;
    puzzleZoneEl.appendChild(fc);
    objectsEl.appendChild(navBtn("→ synthesis antechamber", "scene20"));
    return;
  }

  // Drag puzzle
  puzzleZoneEl.appendChild(puzzlePrompt(`Arrange the five letters to spell the word. Then confirm.`));

  const p19 = STATE.puzzle.scene19;
  const LETTERS = ["Y","H","P","P","A"];

  const lettersRow = document.createElement("div"); lettersRow.className = "drag-letters"; lettersRow.id = "drag-src";
  const slotsRow = document.createElement("div"); slotsRow.className = "letter-slots"; slotsRow.id = "drag-slots";

  // Track which slots have letters
  // slots: array of 5 (null or letter index)
  let srcLetters = []; // {letter, idx, el}
  let slotContents = Array(5).fill(null); // each = {letter, srcIdx}

  // Rebuild from state
  if (p19.slots) slotContents = p19.slots.slice();

  function refreshDrag() {
    lettersRow.innerHTML = "";
    slotsRow.innerHTML = "";

    // which src indices are used
    const usedSrc = new Set();
    slotContents.forEach(s => { if (s !== null) usedSrc.add(s.srcIdx); });

    // Source tokens
    LETTERS.forEach((letter, i) => {
      if (usedSrc.has(i)) return; // in a slot
      const tok = document.createElement("div");
      tok.className = "letter-token";
      tok.textContent = letter;
      tok.dataset.srcIdx = i;
      tok.draggable = true;
      tok.addEventListener("dragstart", ev => {
        ev.dataTransfer.setData("srcIdx", i);
        ev.dataTransfer.setData("fromSlot", "");
        tok.classList.add("dragging");
      });
      tok.addEventListener("dragend", () => tok.classList.remove("dragging"));
      lettersRow.appendChild(tok);
    });

    // Slot tokens (occupied src letters can also be dragged out)
    slotContents.forEach((content, slotI) => {
      const slot = document.createElement("div");
      slot.className = "letter-slot" + (content ? " filled" : "");
      slot.dataset.slotIdx = slotI;
      slot.innerHTML = `<span class="slot-idx">${slotI+1}</span>`;
      if (content) {
        slot.textContent = content.letter;
        slot.dataset.slotIdx = slotI;
        // Make filled slot draggable to move back
        slot.draggable = true;
        slot.addEventListener("dragstart", ev => {
          ev.dataTransfer.setData("srcIdx", content.srcIdx);
          ev.dataTransfer.setData("fromSlot", slotI);
          slot.style.opacity = "0.4";
        });
        slot.addEventListener("dragend", () => slot.style.opacity = "");
      }
      slot.addEventListener("dragover", ev => { ev.preventDefault(); slot.classList.add("over"); });
      slot.addEventListener("dragleave", () => slot.classList.remove("over"));
      slot.addEventListener("drop", ev => {
        ev.preventDefault();
        slot.classList.remove("over");
        const srcIdx = parseInt(ev.dataTransfer.getData("srcIdx"));
        const fromSlot = ev.dataTransfer.getData("fromSlot");
        // If dropping from another slot, clear that slot
        if (fromSlot !== "") {
          slotContents[parseInt(fromSlot)] = null;
        }
        // If this slot already has content, return it to pool
        if (slotContents[slotI] !== null) {
          // Just clear it (goes back to pool)
          slotContents[slotI] = null;
        }
        slotContents[slotI] = { letter: LETTERS[srcIdx], srcIdx };
        p19.slots = slotContents.slice();
        saveState();
        refreshDrag();
      });
      slotsRow.appendChild(slot);
    });
  }

  refreshDrag();
  puzzleZoneEl.appendChild(lettersRow);
  puzzleZoneEl.appendChild(slotsRow);

  const clearBtn = document.createElement("button");
  clearBtn.className = "btn";
  clearBtn.textContent = "clear arrangement";
  clearBtn.style.marginRight = "10px";
  clearBtn.addEventListener("click", () => {
    slotContents = Array(5).fill(null);
    p19.slots = slotContents.slice();
    saveState();
    refreshDrag();
    clearFeedback();
  });

  const checkBtn = submitBtn("check arrangement");
  checkBtn.addEventListener("click", () => {
    const word = slotContents.map(s => s ? s.letter : "").join("");
    if (slotContents.some(s => s === null)) {
      setFeedback("All five slots must be filled before checking.", "err"); return;
    }
    if (word === "HAPPY") {
      markSolved("scene19");
      grantFragment("E");
      setFeedback("The velvet tray sinks. A fragment card rises. HAPPY — five letters. Fragment E collected.", "ok");
      render();
    } else {
      setFeedback(`"${word}" — not a word he would have used. The dome inscription says it: one must imagine Sisyphus _____.`, "err");
    }
  });

  const btnRow = document.createElement("div"); btnRow.className = "input-row";
  btnRow.append(clearBtn, checkBtn);
  puzzleZoneEl.appendChild(btnRow);
}

// ── SCENE 20 — Synthesis Antechamber ──
function renderScene20() {
  setBreadcrumb("Wing 5 / Scene 20");
  sceneTitleEl.textContent = "Scene 20 — The Synthesis Antechamber";
  document.getElementById("mainPanel").style.background = "#0f0d0a";
  sceneBodyEl.innerHTML = `
    <p>A bare, clean room. One table. On the table: five small boxes, each with a glowing slot. Above each box, a poetic clue label in gold on dark wood. The labels are displayed in a randomized order — they are never in the same sequence twice.</p>
    <p>Below all five boxes:</p>
    <blockquote><em>"Each box belongs to one clue. Enter the number that answers each clue. When all five are correctly placed, this room will convert them. In this house, A is 1. B is 2. And so on through Z at 26. The five numbers, converted, spell a name. That name is your answer."</em></blockquote>
    <p>A folded note on the table: <em>"The house has been here a long time. It has been waiting to ask you something it already knows the answer to. It hopes you found the journey worth the asking. Across two cities and thirteen hours, it built itself for someone. Now it would like to say her name."</em></p>`;

  hidePuzzle();
  clearDetail();
  clearFeedback();
  objectsEl.innerHTML = "";
  objectsEl.appendChild(tunaBtn("scene20"));
  objectsEl.appendChild(navBtn("← scene 19", "scene19"));

  showPuzzle();
  puzzleZoneEl.innerHTML = "";

  const p20 = STATE.puzzle.scene20;

  // Initialize shuffle order if not set
  if (!p20.shuffleOrder) {
    const indices = [0,1,2,3,4];
    // Seeded shuffle using current timestamp as seed
    const seed = Date.now();
    function seededRand(s) { let x = Math.sin(s+1)*10000; return x - Math.floor(x); }
    for (let i = 4; i > 0; i--) {
      const j = Math.floor(seededRand(seed + i) * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    p20.shuffleOrder = indices;
    p20.placed = {};
    saveState();
  }

  if (p20.done) {
    // Show conversion animation result
    const resultEl = document.createElement("div");
    resultEl.className = "synthesis-result";
    resultEl.textContent = "1→A  14→N  14→N  9→I  5→E  → ANNIE";
    puzzleZoneEl.appendChild(resultEl);
    const notice = document.createElement("p");
    notice.style.cssText = "font-style:italic;color:#c9a96e;text-align:center;font-size:19px;margin-bottom:16px;";
    notice.textContent = "A staircase descends.";
    puzzleZoneEl.appendChild(notice);
    objectsEl.appendChild(navBtn("↓ final door", "scene21"));
    return;
  }

  const grid = document.createElement("div"); grid.className = "synthesis-grid";
  let allCorrect = true;

  p20.shuffleOrder.forEach(idx => {
    const label = SYNTHESIS_LABELS[idx];
    const slot = document.createElement("div");
    slot.className = "synthesis-slot";
    if (p20.placed[label.id] !== undefined) slot.classList.add("correct");

    const labelEl = document.createElement("div");
    labelEl.className = "slot-label";
    labelEl.textContent = label.text;

    const inp = document.createElement("input");
    inp.type = "text";
    inp.className = "txt-input slot-input";
    inp.placeholder = "number";
    inp.addEventListener("input", () => checkTunaHome(inp.value));

    const checkEl = document.createElement("span"); checkEl.className = "slot-check";

    if (p20.placed[label.id] !== undefined) {
      inp.value = p20.placed[label.id];
      inp.disabled = true;
      inp.className += " locked";
      checkEl.textContent = "✓";
    } else {
      allCorrect = false;
    }

    const checkSlotBtn = submitBtn("→");
    checkSlotBtn.style.padding = "8px 10px";
    if (p20.placed[label.id] !== undefined) checkSlotBtn.style.display = "none";

    checkSlotBtn.addEventListener("click", () => {
      const v = normalize(inp.value);
      const accepted = String(label.answer);
      if (v === accepted || v === numberWord(label.answer)) {
        p20.placed[label.id] = inp.value;
        saveState();
        setFeedback("Correct match.", "ok");
        // Check if all placed
        const allPlaced = SYNTHESIS_LABELS.every(l => p20.placed[l.id] !== undefined);
        if (allPlaced) {
          p20.done = true;
          saveState();
          runSynthesisAnimation();
        } else {
          render();
        }
      } else {
        slot.classList.add("shake");
        setTimeout(() => slot.classList.remove("shake"), 400);
        setFeedback("That number does not match this clue. Revisit the relevant room.", "err");
      }
    });
    inp.addEventListener("keydown", e => { if (e.key === "Enter") checkSlotBtn.click(); });

    slot.append(labelEl, inp, checkSlotBtn, checkEl);
    grid.appendChild(slot);
  });

  puzzleZoneEl.appendChild(grid);
}

function numberWord(n) {
  const words = {1:"one",5:"five",9:"nine",14:"fourteen"};
  return words[n] || "";
}

function runSynthesisAnimation() {
  puzzleZoneEl.innerHTML = "";
  const pairs = [{n:1,l:"A"},{n:14,l:"N"},{n:14,l:"N"},{n:9,l:"I"},{n:5,l:"E"}];
  const resultEl = document.createElement("div"); resultEl.className = "synthesis-result";
  resultEl.textContent = "";
  puzzleZoneEl.appendChild(resultEl);

  let i = 0;
  function step() {
    if (i < pairs.length) {
      const p = pairs[i];
      resultEl.textContent += `${p.n}→${p.l}  `;
      i++;
      setTimeout(step, 700);
    } else {
      setTimeout(() => {
        resultEl.textContent += "→ ANNIE";
        const notice = document.createElement("p");
        notice.style.cssText = "font-style:italic;color:#c9a96e;text-align:center;font-size:19px;margin-top:16px;";
        notice.textContent = "A staircase descends.";
        puzzleZoneEl.appendChild(notice);
        objectsEl.appendChild(navBtn("↓ final door", "scene21"));
        setFeedback("Synthesis complete. A staircase descends.", "ok");
      }, 400);
    }
  }
  setTimeout(step, 300);
}
