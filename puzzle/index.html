<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blue Hall Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: radial-gradient(circle at top, #1b274a, #10192f 54%, #080d17 100%);
        --panel: rgba(13, 19, 34, 0.82);
        --panel-solid: rgba(10, 16, 29, 0.95);
        --border: rgba(202, 178, 128, 0.28);
        --text: #e8e4d9;
        --muted: #a9a092;
        --accent: #c9a96e;
        --accent-strong: #dfc28b;
        --good: #90b07c;
        --bad: #c78a84;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        font-family: "EB Garamond", Garamond, serif;
        background: var(--bg) fixed;
        color: var(--text);
        line-height: 1.55;
        letter-spacing: 0.012em;
      }

      .page {
        width: min(1200px, calc(100vw - 2rem));
        margin: 1rem auto 2rem;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 10px;
        padding: 0.7rem 0.9rem;
        font-family: "Fira Code", monospace;
        font-size: 0.82rem;
      }

      .topbar strong {
        color: var(--accent-strong);
      }

      .topbar-controls {
        display: flex;
        gap: 0.45rem;
        align-items: center;
      }

      .code-input {
        width: 180px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr minmax(260px, 320px);
        gap: 0.9rem;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 10px;
        backdrop-filter: blur(5px);
      }

      .main-panel {
        padding: 1rem;
      }

      .room-title {
        font-size: 1.8rem;
        font-weight: 500;
        margin-bottom: 0.8rem;
      }

      .room-text p {
        margin: 0.5rem 0;
        font-size: 1.13rem;
      }

      .inline-action {
        border: none;
        background: transparent;
        color: var(--accent);
        font-family: inherit;
        font-size: inherit;
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 2px;
        cursor: pointer;
        padding: 0;
      }

      .inline-action:hover {
        color: var(--accent-strong);
      }

      .inline-action.locked {
        color: var(--muted);
        text-decoration-style: dotted;
      }

      .objects {
        margin: 1rem 0 0.7rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .obj-btn {
        border: 1px solid var(--border);
        background: rgba(18, 26, 44, 0.83);
        color: var(--accent-strong);
        border-radius: 6px;
        padding: 0.34rem 0.55rem;
        cursor: pointer;
        font-family: "Fira Code", monospace;
        font-size: 0.8rem;
      }

      .obj-btn[disabled] {
        color: var(--muted);
        border-style: dotted;
        cursor: not-allowed;
      }

      .text-card {
        border: 1px solid var(--border);
        background: var(--panel-solid);
        border-radius: 8px;
        padding: 0.7rem;
        margin: 0.6rem 0 0;
        white-space: pre-wrap;
      }

      .feedback {
        margin-top: 0.6rem;
        min-height: 1.3rem;
        font-family: "Fira Code", monospace;
        font-size: 0.8rem;
      }

      .ok {
        color: var(--good);
      }

      .err {
        color: var(--bad);
      }

      .puzzle-zone {
        margin-top: 0.9rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(11, 18, 32, 0.92);
        padding: 0.7rem;
      }

      .puzzle-zone h3 {
        font-family: "Fira Code", monospace;
        font-size: 0.83rem;
        margin-bottom: 0.5rem;
        color: var(--accent-strong);
      }

      .drag-pool,
      .slots {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .drag-item {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: rgba(35, 30, 22, 0.5);
        color: var(--text);
        padding: 0.35rem 0.5rem;
        cursor: grab;
        font-family: "Fira Code", monospace;
        font-size: 0.78rem;
        line-height: 1.35;
        white-space: normal;
      }

      .drag-item[draggable="false"] {
        cursor: default;
      }

      .slot {
        border: 1px dashed rgba(202, 178, 128, 0.45);
        border-radius: 6px;
        padding: 0.45rem;
        min-width: 180px;
        min-height: 2rem;
        background: rgba(10, 17, 30, 0.95);
      }

      .slot strong {
        color: var(--accent);
        font-family: "Fira Code", monospace;
        font-size: 0.74rem;
        display: block;
        margin-bottom: 0.28rem;
      }

      .control-row {
        margin-top: 0.55rem;
        display: flex;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .sequence-list {
        margin: 0.55rem 0 0;
        padding-left: 1.2rem;
        display: grid;
        gap: 0.42rem;
      }

      .cheat-card {
        margin-top: 0.7rem;
        border: 1px solid rgba(223, 194, 139, 0.5);
        border-radius: 8px;
        background: rgba(44, 31, 15, 0.42);
        padding: 0.6rem;
      }

      .cheat-card h4 {
        font-family: "Fira Code", monospace;
        font-size: 0.78rem;
        color: var(--accent-strong);
        margin-bottom: 0.4rem;
      }

      .cheat-card p {
        margin: 0.32rem 0;
        font-size: 1rem;
      }

      .input-row {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.55rem;
      }

      input[type="text"] {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #0a111f;
        color: var(--text);
        padding: 0.45rem 0.55rem;
        font-family: "Fira Code", monospace;
        font-size: 0.82rem;
      }

      .btn {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: rgba(35, 30, 22, 0.5);
        color: var(--accent-strong);
        font-family: "Fira Code", monospace;
        font-size: 0.8rem;
        padding: 0.45rem 0.62rem;
        cursor: pointer;
      }

      .btn:disabled {
        color: var(--muted);
        cursor: not-allowed;
      }

      .note-panel {
        padding: 0.8rem;
        position: sticky;
        top: 1rem;
      }

      .note-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.65rem;
      }

      .note-head h2 {
        font-family: "Fira Code", monospace;
        font-size: 0.84rem;
        color: var(--accent-strong);
      }

      .note-body {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.6rem;
        background: rgba(8, 12, 22, 0.82);
        min-height: 70vh;
        max-height: 78vh;
        overflow: auto;
        white-space: pre-wrap;
        font-size: 1rem;
      }

      .tiny {
        font-size: 0.8rem;
        color: var(--muted);
        font-family: "Fira Code", monospace;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .note-body {
          min-height: 220px;
          max-height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <div><strong>Blue Hall Archive</strong> / text-only literary puzzle house</div>
        <div class="tiny">click to explore · type to solve · drag to arrange</div>
        <div class="topbar-controls">
          <input id="cheatCodeInput" class="code-input" type="text" placeholder="cheat code?" />
          <button id="cheatCodeSubmitBtn" class="btn" type="button">unlock cheats</button>
          <button id="cheatToggleBtn" class="btn" type="button" style="display:none;">enable cheat mode</button>
          <button id="cheatSolveAllBtn" class="btn" type="button" style="display:none;">auto-solve all</button>
        </div>
      </div>
      <div class="layout">
        <section class="panel main-panel">
          <h1 id="roomTitle" class="room-title"></h1>
          <div id="roomText" class="room-text"></div>
          <div id="objects" class="objects"></div>
          <div id="details"></div>
          <div id="puzzle"></div>
          <div id="feedback" class="feedback"></div>
        </section>
        <aside class="panel note-panel">
          <div class="note-head">
            <h2>Notebook</h2>
            <button id="resetBtn" class="btn" type="button">reset</button>
          </div>
          <div id="notebookBody" class="note-body"></div>
        </aside>
      </div>
    </div>
    <script>
      const STORAGE_KEY = "blue_hall_archive_state_v1";
      const NOTEBOOK_TEXT = {
        bookshelf: `BOOKSHELF SOLVED
Feeling = sensation interpreted in context
Burden = repetition without escape
Guilt = theory collapsing into conscience
Echo = titles carrying afterimage
Proof = knowledge without surrender
Message found: OPEN SEMINAR`,
        ladder: `LADDER SOLVED
ORDER BY AFTER IMAGE`,
        desk: `DESK SOLVED
Ordered confession fragments
Output = TWENTYONE`,
        seminar: `SEMINAR SOLVED
Matched context to bodily state
Hidden letter order -> FOURTEEN`,
        listening: `LISTENING SOLVED
Use afterimage order:
STAIR
DESK
SEMINAR
CABINET`,
        stair: `STAIR SOLVED
Invariant phrase = THE BOULDER WAITS BELOW
Letter count = TWENTY`,
        cabinet: `CABINET SOLVED
Cipher shift = -2
Plaintext known
Proved without revealing
Output = ONE`,
        final: `FINAL ANSWER
TUNA`,
      };

      const defaultState = () => ({
        room: "blueHall",
        solved: {
          bookshelf: false,
          ladder: false,
          desk: false,
          seminar: false,
          listening: false,
          stair: false,
          cabinet: false,
          final: false,
        },
        unlocked: {
          seminar: false,
          parlor: false,
          stair: false,
          cabinet: false,
          finalArchive: false,
        },
        cheatUnlocked: false,
        cheatMode: false,
        notebook: [],
        detailText: "",
        puzzle: {
          bookshelf: { placed: {}, locked: false },
          desk: { placed: [], ordered: false, extracted: false },
          seminar: { placed: {}, matched: false, extracted: false },
          listening: { placed: [], ordered: false, confirmed: false },
          stair: { climb: 0, invariant: false },
          cabinet: { decoded: false, qIndex: 0, outputReady: false },
          finalArchive: { placed: [], arranged: false },
        },
      });

      let STATE = loadState();

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultState();
          const parsed = JSON.parse(raw);
          return {
            ...defaultState(),
            ...parsed,
            cheatUnlocked: Boolean(parsed.cheatUnlocked || parsed.cheatMode),
            cheatMode: Boolean(parsed.cheatMode),
            solved: { ...defaultState().solved, ...(parsed.solved || {}) },
            unlocked: { ...defaultState().unlocked, ...(parsed.unlocked || {}) },
            puzzle: {
              ...defaultState().puzzle,
              ...(parsed.puzzle || {}),
              bookshelf: { ...defaultState().puzzle.bookshelf, ...(parsed.puzzle?.bookshelf || {}) },
              desk: { ...defaultState().puzzle.desk, ...(parsed.puzzle?.desk || {}) },
              seminar: { ...defaultState().puzzle.seminar, ...(parsed.puzzle?.seminar || {}) },
              listening: { ...defaultState().puzzle.listening, ...(parsed.puzzle?.listening || {}) },
              stair: { ...defaultState().puzzle.stair, ...(parsed.puzzle?.stair || {}) },
              cabinet: { ...defaultState().puzzle.cabinet, ...(parsed.puzzle?.cabinet || {}) },
              finalArchive: { ...defaultState().puzzle.finalArchive, ...(parsed.puzzle?.finalArchive || {}) },
            },
          };
        } catch (_err) {
          return defaultState();
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
      }

      function normalize(value) {
        return value
          .toLowerCase()
          .replace(/[^\p{L}\p{N}\s]/gu, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function matchesAnswer(value, accepted) {
        const input = normalize(value);
        return accepted.some((a) => normalize(a) === input);
      }

      function addNotebookEntry(key) {
        const text = NOTEBOOK_TEXT[key];
        if (!text) return;
        if (!STATE.notebook.includes(text)) STATE.notebook.push(text);
      }

      function checkUnlocks() {
        STATE.unlocked = {
          seminar: STATE.solved.bookshelf,
          parlor: STATE.solved.ladder,
          cabinet: STATE.solved.desk,
          stair: STATE.solved.seminar && STATE.solved.listening,
          finalArchive: STATE.solved.desk && STATE.solved.seminar && STATE.solved.stair && STATE.solved.cabinet,
        };
        if (STATE.cheatMode) {
          STATE.unlocked.seminar = true;
          STATE.unlocked.parlor = true;
          STATE.unlocked.cabinet = true;
          STATE.unlocked.stair = true;
          STATE.unlocked.finalArchive = true;
        }
      }

      const roomTitleEl = document.getElementById("roomTitle");
      const roomTextEl = document.getElementById("roomText");
      const objectsEl = document.getElementById("objects");
      const detailsEl = document.getElementById("details");
      const puzzleEl = document.getElementById("puzzle");
      const feedbackEl = document.getElementById("feedback");
      const notebookBodyEl = document.getElementById("notebookBody");
      const cheatCodeInput = document.getElementById("cheatCodeInput");
      const cheatCodeSubmitBtn = document.getElementById("cheatCodeSubmitBtn");
      const cheatToggleBtn = document.getElementById("cheatToggleBtn");
      const cheatSolveAllBtn = document.getElementById("cheatSolveAllBtn");

      const CHEAT_TEXT = {
        blueHall:
          "Unlock chain summary: Bookshelf -> Seminar, Ladder -> Listening, Desk -> Cabinet, Seminar+Listening -> Stair, Desk+Seminar+Stair+Cabinet -> Final Archive.",
        bookshelf:
          "Match tabs by meaning: FEELING->A, BURDEN->B, GUILT->C, ECHO->D, PROOF->E. Reason: each card defines that exact concept internally.",
        ladder:
          "Wall order is 1,3,2,4. Read top words in that order: ORDER BY AFTER IMAGE.",
        desk:
          "Correct sequence is the printed order 1 through 9, tracing rationalization -> lie -> revision -> consequence. Initial letters spell TWENTYONE.",
        seminar:
          "Match contexts: 1 anticipation, 2 dread, 3 awe, 4 exhaustion, 5 regret, 6 panic-shame, 7 rivalry, 8 vertigo. Hidden letters in metronome order yield FOURTEEN.",
        listening:
          "Program directions point to room order: STAIR -> DESK -> SEMINAR -> CABINET. This also sets final archive ordering.",
        stair:
          "Invariant phrase after four climbs: THE BOULDER WAITS BELOW. Count letters (ignore spaces) = 20 -> TWENTY.",
        cabinet:
          "Cipher is Caesar -2: THE FIRST TRUE NUMBER HERE IS ONE. Challenge answers: even, 7, singular, odd. Output: ONE.",
        finalArchive:
          "Place outputs by listening order: TWENTY, TWENTYONE, FOURTEEN, ONE. Convert by alphabet positions: 20=T, 21=U, 14=N, 1=A.",
      };

      function setFeedback(message, kind = "") {
        feedbackEl.textContent = message;
        feedbackEl.className = `feedback ${kind}`.trim();
      }

      function setDetail(text) {
        STATE.detailText = text;
        detailsEl.innerHTML = text ? `<div class="text-card">${text}</div>` : "";
        saveState();
      }

      function appendCheatCard(zone, key) {
        if (!STATE.cheatMode) return;
        const card = document.createElement("div");
        card.className = "cheat-card";
        card.innerHTML = `<h4>Cheat mode</h4><p>${CHEAT_TEXT[key] || "No cheat text defined for this room."}</p>`;
        const controls = document.createElement("div");
        controls.className = "control-row";
        const solveBtn = document.createElement("button");
        solveBtn.className = "btn";
        solveBtn.type = "button";
        solveBtn.textContent = "auto-solve this room";
        solveBtn.addEventListener("click", () => {
          autoSolveRoom(STATE.room);
          render();
        });
        controls.append(solveBtn);
        card.append(controls);
        zone.append(card);
      }

      function roomLink(label, target, locked = false) {
        return `<button class="inline-action ${locked ? "locked" : ""}" data-nav="${target}" ${locked ? "disabled" : ""}>[${label}]</button>`;
      }

      function objectButton(label, handler, locked = false) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "obj-btn";
        btn.textContent = `[${label}]`;
        if (locked) {
          btn.disabled = true;
        } else {
          btn.addEventListener("click", handler);
        }
        return btn;
      }

      function renderNotebook() {
        notebookBodyEl.textContent = STATE.notebook.length ? STATE.notebook.join("\n\n") : "No entries yet.";
      }

      function navTo(room) {
        STATE.room = room;
        STATE.detailText = "";
        render();
      }

      function bindNavLinks() {
        roomTextEl.querySelectorAll("[data-nav]").forEach((node) => {
          node.addEventListener("click", () => navTo(node.getAttribute("data-nav")));
        });
      }

      function render() {
        checkUnlocks();
        renderNotebook();
        setFeedback("");
        detailsEl.innerHTML = "";
        puzzleEl.innerHTML = "";
        objectsEl.innerHTML = "";
        const renderer = ROOM_RENDERERS[STATE.room] || ROOM_RENDERERS.blueHall;
        renderer();
        if (STATE.detailText) detailsEl.innerHTML = `<div class="text-card">${STATE.detailText}</div>`;
        bindNavLinks();
        if (STATE.cheatUnlocked) {
          cheatCodeInput.style.display = "none";
          cheatCodeSubmitBtn.style.display = "none";
          cheatToggleBtn.style.display = "inline-block";
          cheatToggleBtn.textContent = STATE.cheatMode ? "disable cheat mode" : "enable cheat mode";
          cheatSolveAllBtn.style.display = STATE.cheatMode ? "inline-block" : "none";
        } else {
          cheatCodeInput.style.display = "inline-block";
          cheatCodeSubmitBtn.style.display = "inline-block";
          cheatToggleBtn.style.display = "none";
          cheatSolveAllBtn.style.display = "none";
        }
        saveState();
      }

      function finishRoom(roomKey, noteKey) {
        STATE.solved[roomKey] = true;
        addNotebookEntry(noteKey);
        checkUnlocks();
        saveState();
      }

      function autoSolveRoom(room) {
        if (room === "bookshelf" && !STATE.solved.bookshelf) {
          STATE.puzzle.bookshelf.placed = { A: "FEELING", B: "BURDEN", C: "GUILT", D: "ECHO", E: "PROOF" };
          STATE.puzzle.bookshelf.locked = true;
          finishRoom("bookshelf", "bookshelf");
          return;
        }
        if (room === "ladder" && !STATE.solved.ladder) {
          finishRoom("ladder", "ladder");
          return;
        }
        if (room === "desk" && !STATE.solved.desk) {
          STATE.puzzle.desk.placed = [0, 1, 2, 3, 4, 5, 6, 7, 8];
          STATE.puzzle.desk.ordered = true;
          finishRoom("desk", "desk");
          return;
        }
        if (room === "seminar" && !STATE.solved.seminar) {
          STATE.puzzle.seminar.placed = {
            1: "anticipation",
            2: "dread",
            3: "awe",
            4: "exhaustion",
            5: "regret",
            6: "panic-shame",
            7: "rivalry",
            8: "vertigo",
          };
          STATE.puzzle.seminar.matched = true;
          finishRoom("seminar", "seminar");
          return;
        }
        if (room === "listening" && !STATE.solved.listening) {
          STATE.puzzle.listening.placed = ["stair", "desk", "seminar", "cabinet"];
          STATE.puzzle.listening.ordered = true;
          finishRoom("listening", "listening");
          return;
        }
        if (room === "stair" && !STATE.solved.stair) {
          STATE.puzzle.stair.climb = 4;
          STATE.puzzle.stair.invariant = true;
          finishRoom("stair", "stair");
          return;
        }
        if (room === "cabinet" && !STATE.solved.cabinet) {
          STATE.puzzle.cabinet.decoded = true;
          STATE.puzzle.cabinet.qIndex = 4;
          STATE.puzzle.cabinet.outputReady = true;
          finishRoom("cabinet", "cabinet");
          return;
        }
        if (room === "finalArchive" && !STATE.solved.final) {
          STATE.puzzle.finalArchive.placed = ["TWENTY", "TWENTYONE", "FOURTEEN", "ONE"];
          STATE.puzzle.finalArchive.arranged = true;
          finishRoom("final", "final");
        }
      }

      function autoSolveAll() {
        autoSolveRoom("bookshelf");
        autoSolveRoom("ladder");
        autoSolveRoom("desk");
        autoSolveRoom("seminar");
        autoSolveRoom("listening");
        autoSolveRoom("stair");
        autoSolveRoom("cabinet");
        autoSolveRoom("finalArchive");
      }

      function makeDragItem(id, label, clickableDetail = "") {
        const item = document.createElement("div");
        item.className = "drag-item";
        item.draggable = true;
        item.textContent = label;
        item.dataset.dragId = id;
        item.addEventListener("dragstart", (ev) => {
          ev.dataTransfer.setData("text/plain", id);
        });
        if (clickableDetail) {
          item.addEventListener("click", () => setFeedback(clickableDetail));
        }
        return item;
      }

      function renderBlueHall() {
        roomTitleEl.textContent = "Blue Hall";
        const extra = [];
        if (STATE.solved.bookshelf) extra.push("The seminar door no longer looks dark; it looks patient.");
        if (STATE.solved.ladder) extra.push("A seam near the parlor door catches light that was not there before.");
        if (STATE.solved.desk) extra.push("The cabinet seems less locked than unwilling.");
        if (STATE.solved.final) extra.push("The crossed-out directory no longer reads like revision. It reads like a trail.");
        const discoveredWays = [
          `To your right stands a tall ${roomLink("bookshelf", "bookshelf")} with a narrow rolling ${roomLink("ladder", "ladder")} beside it.`,
          `Ahead is a writing ${roomLink("desk", "desk")} under a dim lamp.`,
          `On the wall hangs a crossed-out ${roomLink("directory", "directory")}.`,
        ];
        if (STATE.unlocked.seminar) discoveredWays.push(`To the left, a frosted-glass ${roomLink("seminar door", "seminar")} now stands open to light.`);
        if (STATE.unlocked.parlor) discoveredWays.push(`Farther down, the almost-silent ${roomLink("parlor door", "listening")} is no longer shut against you.`);
        if (STATE.unlocked.stair) discoveredWays.push(`At the back rises a stone ${roomLink("stair", "stair")}; the brass chain is gone.`);
        if (STATE.unlocked.cabinet) discoveredWays.push(`Beneath the stair, the ${roomLink("cabinet", "cabinet")} has given up refusal.`);
        if (STATE.unlocked.finalArchive) discoveredWays.push(`Behind the directory, a seam has opened into the ${roomLink("final archive", "finalArchive")}.`);
        roomTextEl.innerHTML = `
          <p>You step into a blue-painted hall that feels less inhabited than revised. The air smells faintly of paper, graphite, and rain.</p>
          ${discoveredWays.map((line) => `<p>${line}</p>`).join("")}
          ${extra.map((e) => `<p>${e}</p>`).join("")}
        `;

        const buttons = [
          objectButton("bookshelf", () => navTo("bookshelf")),
          objectButton("ladder", () => navTo("ladder")),

          resetBtn.textContent = "clear order";
          resetBtn.addEventListener("click", () => {
            STATE.puzzle.listening.placed = [];
            setFeedback("Order cleared.", "ok");
            render();
          });
          controls.append(resetBtn);
          zone.append(controls);
        }
        appendCheatCard(zone, "listening");
        puzzleEl.append(zone);
      }

      function renderStair() {
        roomTitleEl.textContent = "Stair of Recurrence";
        roomTextEl.innerHTML = `<p>The chain is gone. The stair rises in dim blue stone. On the first landing sits a round stone. A brass plaque is bolted to the wall.</p>${STATE.solved.stair ? "<p>The stone no longer seems heavy. It seems legible.</p>" : ""}`;
        const climbs = [
          "You climb. The light shifts. The plaque looks duller. The landing feels no closer. The boulder waits below.",
          "You climb again. The air grows colder. The landing feels staged. The wall seems cleaner. The boulder waits below.",
          "You climb again. The light narrows. The landing looks newly built. The silence is heavier. The boulder waits below.",
          "You climb again. Nothing resolves. The landing is still a landing. The room has only changed around the same fact. The boulder waits below.",
        ];
        objectsEl.append(
          objectButton("climb", () => {
            if (STATE.solved.stair) {
              setDetail("The recurrence has already been read.");
              return;
            }
            STATE.puzzle.stair.climb = Math.min(4, STATE.puzzle.stair.climb + 1);
            if (STATE.puzzle.stair.climb >= 4) STATE.puzzle.stair.invariant = true;
            setDetail(climbs[STATE.puzzle.stair.climb - 1] || climbs[3]);
            saveState();
            render();
          }),
          objectButton("stone", () => setDetail("The stone looks as if it has been placed here, lost here, and always been here.")),
          objectButton(
            "plaque",
            () =>
              setDetail(
                STATE.puzzle.stair.climb >= 4 && !STATE.solved.stair
                  ? "Ignore what changed.\nCount only what survived every telling."
                  : "Ignore height.\nCount what survives every telling."
              )
          ),
          objectButton("window", () => setDetail("Outside is only pale weather. Nothing outside helps.")),
          objectButton("return", () => navTo("blueHall"))
        );
        const zone = document.createElement("div");
        zone.className = "puzzle-zone";
        zone.innerHTML = "<h3>Recurrence</h3>";
        if (STATE.puzzle.stair.invariant || STATE.solved.stair) {
          const inv = document.createElement("div");
          inv.className = "text-card";
          inv.textContent = "Invariant phrase:\nTHE BOULDER WAITS BELOW";
          zone.append(inv);
          if (!STATE.solved.stair) {
            const row = document.createElement("div");
            row.className = "input-row";
            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = "number-word";
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.textContent = "submit";
            btn.addEventListener("click", () => {
              if (matchesAnswer(input.value, ["TWENTY"])) {
                finishRoom("stair", "stair");
                setFeedback("TWENTY accepted.", "ok");
                render();
              } else {
                setFeedback("Count letters only, ignore spaces.", "err");
              }
            });
            row.append(input, btn);
            zone.append(row);
          }
        } else {
          const t = document.createElement("div");
          t.className = "tiny";
          t.textContent = "Climb until the invariant becomes explicit.";
          zone.append(t);
        }
        appendCheatCard(zone, "stair");
        puzzleEl.append(zone);
      }

      function renderCabinet() {
        roomTitleEl.textContent = "Cabinet of Proofs";
        roomTextEl.innerHTML = `<p>The cabinet beneath the stairs has no keyhole. It has three rotating alphabet rings, a black challenge slate, a strip of shifted ciphertext, and a proof card.</p>${STATE.solved.cabinet ? "<p>The slate goes blank, as if satisfied by restraint.</p>" : ""}`;
        objectsEl.append(
          objectButton(
            "alphabet rings",
            () =>
              setDetail(
                "The rings allow a Caesar shift in either direction. The ciphertext was encoded by shifting each letter forward by the same number of positions. To read it, shift backward by that amount. Try the smallest useful shift first."
              )
          ),
          objectButton("ciphertext", () => setDetail("VJG HKTUV VTWG PWODGT JGTG KU QPG")),
          objectButton("challenge slate", () => setDetail("Answer without giving the final word itself.")),
          objectButton("proof card", () => setDetail("A simple shift can hide a sentence.\nA good question can test knowledge without demanding the sentence itself.")),
          objectButton("return", () => navTo("blueHall"))
        );
        const zone = document.createElement("div");
        zone.className = "puzzle-zone";
        zone.innerHTML = "<h3>Cipher and proof</h3>";
        if (!STATE.puzzle.cabinet.decoded) {
          const row = document.createElement("div");
          row.className = "input-row";
          const input = document.createElement("input");
          input.type = "text";
          input.placeholder = "Decoded plaintext";
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "decode";
          btn.addEventListener("click", () => {
            if (matchesAnswer(input.value, ["THE FIRST TRUE NUMBER HERE IS ONE"])) {
              STATE.puzzle.cabinet.decoded = true;
              setFeedback("Plaintext accepted. Challenge mode opened.", "ok");
              render();
            } else {
              setFeedback("Not yet. Start with the simplest Caesar shift.", "err");
            }
          });
          row.append(input, btn);
          zone.append(row);
        } else if (!STATE.puzzle.cabinet.outputReady) {
          const qs = [
            { q: "Is the shift odd or even?", accepted: ["even"] },
            { q: "How many words are in the plaintext?", accepted: ["7", "seven"] },
            { q: "Is the final word singular or plural?", accepted: ["singular"] },
            { q: "Does the final word have odd or even length?", accepted: ["odd"] },
          ];
          const current = qs[STATE.puzzle.cabinet.qIndex];
          const card = document.createElement("div");
          card.className = "text-card";
          card.textContent = `Question ${STATE.puzzle.cabinet.qIndex + 1}:\n${current.q}`;
          zone.append(card);
          const row = document.createElement("div");
          row.className = "input-row";
          const input = document.createElement("input");
          input.type = "text";
          input.placeholder = "answer";
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "submit";
          btn.addEventListener("click", () => {
            if (matchesAnswer(input.value, current.accepted)) {
              STATE.puzzle.cabinet.qIndex += 1;
              if (STATE.puzzle.cabinet.qIndex >= qs.length) STATE.puzzle.cabinet.outputReady = true;
              setFeedback("Accepted.", "ok");
              render();
            } else {
              setFeedback("That does not satisfy the slate.", "err");
            }
          });
          row.append(input, btn);
          zone.append(row);
        } else if (!STATE.solved.cabinet) {
          const card = document.createElement("div");
          card.className = "text-card";
          card.textContent = "Output = ONE";
          zone.append(card);
          const row = document.createElement("div");
          row.className = "input-row";
          const input = document.createElement("input");
          input.type = "text";
          input.placeholder = "cabinet output";
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "submit output";
          btn.addEventListener("click", () => {
            if (matchesAnswer(input.value, ["ONE"])) {
              finishRoom("cabinet", "cabinet");
              setFeedback("Output accepted: ONE", "ok");
              render();
            } else {
              setFeedback("Enter the revealed output exactly.", "err");
            }
          });
          row.append(input, btn);
          zone.append(row);
        }
        appendCheatCard(zone, "cabinet");
        puzzleEl.append(zone);
      }

      function renderFinalArchive() {
        roomTitleEl.textContent = "Final Archive";
        roomTextEl.innerHTML = `<p>A panel behind the crossed-out directory opens inward. Inside is a narrow archive lined with four shallow drawers, a brass wheel, and a reading table with four empty slots.</p><p>Not the words. Their places.</p>`;
        objectsEl.append(
          objectButton(
            "drawers",
            () =>
              setDetail(
                "The drawers contain a single reference card:\n\nA=1  B=2  C=3  D=4  E=5  F=6  G=7\nH=8  I=9  J=10 K=11 L=12 M=13 N=14\nO=15 P=16 Q=17 R=18 S=19 T=20 U=21\nV=22 W=23 X=24 Y=25 Z=26\n\nThe wheel reads the same way."
              )
          ),
          objectButton("wheel", () => setDetail("The wheel has twenty-six positions, one for each letter.")),
          objectButton("table", () => setDetail("ORDER BY AFTER IMAGE")),
          objectButton("notebook", () => setDetail(STATE.notebook.join("\n\n"))),
          objectButton("return", () => navTo("blueHall"))
        );
        const zone = document.createElement("div");
        zone.className = "puzzle-zone";
        zone.innerHTML = "<h3>Arrange outputs using afterimage room order</h3>";
        const words = ["TWENTY", "TWENTYONE", "FOURTEEN", "ONE"];
        const expected = ["TWENTY", "TWENTYONE", "FOURTEEN", "ONE"];
        const placed = STATE.puzzle.finalArchive.placed || [];
        const pool = document.createElement("div");
        pool.className = "drag-pool";
        const used = new Set(placed);
        const glosses = ["burden repeats", "guilt turns inward", "feeling is named", "proof withholds"];
        words.forEach((w) => {
          if (!used.has(w)) pool.append(makeDragItem(`final:${w}`, w, w));
        });
        const slots = document.createElement("div");
        slots.className = "slots";
        for (let i = 0; i < 4; i += 1) {
          const slot = document.createElement("div");
          slot.className = "slot";
          slot.innerHTML = `<strong>slot ${i + 1}</strong><span class="tiny">${glosses[i]}</span>`;
          slot.addEventListener("dragover", (ev) => ev.preventDefault());
          slot.addEventListener("drop", (ev) => {
            ev.preventDefault();
            if (STATE.solved.final || STATE.puzzle.finalArchive.arranged) return;
            const dragId = ev.dataTransfer.getData("text/plain");
            if (!dragId.startsWith("final:")) return;
            const item = dragId.split(":")[1];
            const next = (STATE.puzzle.finalArchive.placed || []).filter((x) => x !== item);
            next[i] = item;
            STATE.puzzle.finalArchive.placed = next;
            render();
          });
          if (placed[i]) {
            const token = makeDragItem(`final:${placed[i]}`, placed[i], placed[i]);
            token.draggable = false;
            slot.append(token);
          }
          slots.append(slot);
        }
        zone.append(pool, slots);
        const check = document.createElement("button");
        check.className = "btn";
        check.textContent = "lock order";
        check.disabled = STATE.puzzle.finalArchive.arranged;
        check.addEventListener("click", () => {
          const ok = expected.every((v, i) => STATE.puzzle.finalArchive.placed[i] === v);
          if (!ok) {
            setFeedback("Not yet. Use the Listening order as sequence authority.", "err");
            return;
          }
          STATE.puzzle.finalArchive.arranged = true;
          setFeedback("Order locked. Convert by place, not spelling.", "ok");
          render();
        });
        zone.append(check);
        if (!STATE.solved.final && !STATE.puzzle.finalArchive.arranged) {
          const controls = document.createElement("div");
          controls.className = "control-row";
          const resetBtn = document.createElement("button");
          resetBtn.className = "btn";
          resetBtn.type = "button";
          resetBtn.textContent = "clear slots";
          resetBtn.addEventListener("click", () => {
            STATE.puzzle.finalArchive.placed = [];
            setFeedback("Slots cleared.", "ok");
            render();
          });
          controls.append(resetBtn);
          zone.append(controls);
        }
        if (STATE.puzzle.finalArchive.arranged && !STATE.solved.final) {
          const row = document.createElement("div");
          row.className = "input-row";
          const input = document.createElement("input");
          input.type = "text";
          input.placeholder = "final answer";
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "submit";
          btn.addEventListener("click", () => {
            if (matchesAnswer(input.value, ["TUNA"])) {
              finishRoom("final", "final");
              setFeedback("The wheel settles. The house stops revising itself.", "ok");
              setDetail("The wheel settles with a quiet finality. The archive yields a single word back to you, as if it had been hidden in every room from the beginning:\n\nTUNA\n\nFor the first time, the house stops revising itself.");
              render();
            } else {
              setFeedback("Convert each number-word by position in the alphabet.", "err");
            }
          });
          row.append(input, btn);
          zone.append(row);
        }
        appendCheatCard(zone, "finalArchive");
        puzzleEl.append(zone);
      }

      const ROOM_RENDERERS = {
        blueHall: renderBlueHall,
        directory: renderDirectory,
        bookshelf: renderBookshelf,
        ladder: renderLadder,
        desk: renderDesk,
        seminar: () => (STATE.unlocked.seminar ? renderSeminar() : navTo("blueHall")),
        listening: () => (STATE.unlocked.parlor ? renderListening() : navTo("blueHall")),
        stair: () => (STATE.unlocked.stair ? renderStair() : navTo("blueHall")),
        cabinet: () => (STATE.unlocked.cabinet ? renderCabinet() : navTo("blueHall")),
        finalArchive: () => (STATE.unlocked.finalArchive ? renderFinalArchive() : navTo("blueHall")),
      };

      document.getElementById("resetBtn").addEventListener("click", () => {
        if (!confirm("Reset all progress for this adventure?")) return;
        STATE = defaultState();
        saveState();
        render();
      });

      cheatCodeSubmitBtn.addEventListener("click", () => {
        if (normalize(cheatCodeInput.value) === "annie") {
          STATE.cheatUnlocked = true;
          saveState();
          setFeedback("Cheat controls unlocked.", "ok");
          render();
        } else {
          setFeedback("Incorrect cheat code.", "err");
        }
      });

      cheatCodeInput.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") cheatCodeSubmitBtn.click();
      });

      cheatToggleBtn.addEventListener("click", () => {
        STATE.cheatMode = !STATE.cheatMode;
        checkUnlocks();
        saveState();
        render();
      });

      cheatSolveAllBtn.addEventListener("click", () => {
        autoSolveAll();
        setFeedback("All rooms auto-solved.", "ok");
        render();
      });

      checkUnlocks();
      render();
    </script>
  </body>
</html>
